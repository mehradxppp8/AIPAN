<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPAN Management Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-neon { transition: all 0.3s ease; }
        .btn-neon:hover { box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); transform: translateY(-2px); }
        .modal.hidden { display: none; opacity: 0; }
        .modal.flex { display: flex; opacity: 1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- LOGIN MODAL -->
    <div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm modal flex">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">AIPAN</h1>
            <p class="text-gray-400 mb-6">Panel Management System</p>
            
            <input type="password" id="password-input" placeholder="Enter Admin Password" 
                   class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-indigo-500 transition-colors text-center text-white">
            
            <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl btn-neon">
                ورود به پنل
            </button>
            <p id="login-error" class="text-red-400 text-sm mt-3 hidden">رمز عبور اشتباه است!</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD (Hidden by default, shown via JS after auth) -->
    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 glass-panel p-6 rounded-2xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-server text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">داشبورد مدیریتی AIPAN</h1>
                    <p class="text-sm text-gray-400">نسخه 2.9.3 | وضعیت: <span class="text-emerald-400">آنلاین</span></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-400 border border-red-500/20 px-4 py-2 rounded-lg hover:bg-red-500/20 transition">
                <i class="fa-solid fa-power-off ml-2"></i> خروج
            </button>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 w-24 h-24 bg-indigo-500/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                <h3 class="text-gray-400 text-sm mb-1">کل کاربران</h3>
                <p class="text-3xl font-bold" id="total-users">0</p>
            </div>
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 w-24 h-24 bg-emerald-500/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                <h3 class="text-gray-400 text-sm mb-1">ترافیک کل</h3>
                <p class="text-3xl font-bold text-emerald-400" id="total-traffic">0 GB</p>
            </div>
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 w-24 h-24 bg-cyan-500/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                <h3 class="text-gray-400 text-sm mb-1">کاربران فعال</h3>
                <p class="text-3xl font-bold text-cyan-400" id="active-users">0</p>
            </div>
        </div>

        <!-- Users Table Section -->
        <div class="glass-panel rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fa-solid fa-users ml-2 text-indigo-400"></i> مدیریت کاربران</h2>
                <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm btn-neon">
                    <i class="fa-solid fa-plus ml-1"></i> کاربر جدید
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-white/5 text-gray-400 text-sm uppercase">
                        <tr>
                            <th class="p-4">نام</th>
                            <th class="p-4">UUID</th>
                            <th class="p-4">محدودیت ترافیک</th>
                            <th class="p-4">انقضا</th>
                            <th class="p-4 text-center">عملیات</th>
                        </tr>
                    </thead>
                    <tbody id="users-list" class="divide-y divide-white/5 text-sm">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm modal">
        <div class="glass-panel p-6 rounded-2xl w-full max-w-lg">
            <h3 class="text-xl font-bold mb-4">افزودن کاربر جدید</h3>
            <div class="space-y-4">
                <input type="text" id="new-name" placeholder="نام کاربر" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-indigo-500 outline-none text-white">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="new-traffic" placeholder="محدودیت ترافیک (GB)" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-indigo-500 outline-none text-white">
                    <input type="number" id="new-days" placeholder="مدت اعتبار (روز)" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-indigo-500 outline-none text-white">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeAddModal()" class="px-4 py-2 rounded-lg text-gray-400 hover:text-white transition">انصراف</button>
                <button onclick="addUser()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg btn-neon">ذخیره</button>
            </div>
        </div>
    </div>

    <script>
        // تنظیمات پایه بر اساس فایل _worker.js شما
        const API_ROUTE = '/sync'; // مسیر پیش‌فرض در کد شما
        let authToken = localStorage.getItem('aipan_token');
        const API_URL = window.location.origin + API_ROUTE;

        // --- Authentication Logic ---
        
        // بررسی وضعیت لاگین هنگام لود صفحه
        if (authToken) {
            if (window.location.pathname === '/login') {
                window.location.href = '/dash';
            } else {
                showDashboard();
            }
        } else {
            if (window.location.pathname !== '/login' && window.location.pathname !== '/') {
                 window.location.href = '/login';
            } else {
                document.getElementById('login-modal').classList.remove('hidden');
                document.getElementById('login-modal').classList.add('flex');
            }
        }

        async function login() {
            const pass = document.getElementById('password-input').value;
            const errorEl = document.getElementById('login-error');
            
            try {
                // استفاده از مسیر صحیح /sync/api/auth طبق فایل _worker.js
                const res = await fetch(`${API_URL}/api/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: pass })
                });
                
                const data = await res.json();

                if (data.success) {
                    authToken = pass;
                    localStorage.setItem('aipan_token', authToken);
                    window.location.href = '/dash';
                } else {
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                alert('خطا در ارتباط با سرور. لطفاً مسیر API_ROUTE را چک کنید.');
            }
        }

        function logout() {
            localStorage.removeItem('aipan_token');
            window.location.href = '/login';
        }

        function showDashboard() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('login-modal').classList.remove('flex');
            document.getElementById('dashboard').classList.remove('hidden');
            loadUsers();
        }

        // --- Data Loading ---
        async function loadUsers() {
            try {
                // دریافت لیست کاربران از /sync/api/users
                const res = await fetch(`${API_URL}/api/users?key=${authToken}`);
                
                if (res.status === 401) {
                    logout();
                    return;
                }

                const data = await res.json();
                const tbody = document.getElementById('users-list');
                tbody.innerHTML = '';
                
                // بروزرسانی آمار
                document.getElementById('total-users').innerText = data.users ? data.users.length : 0;
                document.getElementById('active-users').innerText = data.users ? data.users.filter(u => !u.isPaused).length : 0;
                
                // محاسبه ترافیک تقریبی (بر اساس تعداد درخواست‌ها در کد اصلی)
                let totalReqs = 0;
                if(data.users) {
                    data.users.forEach(u => {
                        const uId = u.id.replace(/-/g, "").toLowerCase();
                        // توجه: در نسخه کلادفلر، ترافیک دقیق نیاز به کوئری جداگانه دارد
                        // اینجا فعلا تعداد کاربران را نمایش می‌دهیم
                    });
                }
                document.getElementById('total-traffic').innerText = "محاسبه زنده";

                if (!data.users || data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">هیچ کاربری یافت نشد</td></tr>';
                    return;
                }

                data.users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-white/5 transition';
                    
                    const expiryDate = user.expiryMs ? new Date(user.expiryMs).toLocaleDateString('fa-IR') : 'دائمی';
                    const trafficLimit = user.limitTotalReq ? (user.limitTotalReq / 6000).toFixed(2) + ' GB' : 'نامحدود';

                    tr.innerHTML = `
                        <td class="p-4 font-medium">${user.name}</td>
                        <td class="p-4 font-mono text-xs text-gray-400 select-all cursor-pointer" onclick="copyText('${user.id}')" title="Click to Copy">${user.id.substring(0, 8)}...</td>
                        <td class="p-4">${trafficLimit}</td>
                        <td class="p-4">${expiryDate}</td>
                        <td class="p-4 text-center space-x-2">
                            <button onclick="copySub('${user.name}')" class="text-indigo-400 hover:text-indigo-300 mx-1" title="کپی لینک ساب"><i class="fa-solid fa-link"></i></button>
                            <button onclick="deleteUser('${user.id}')" class="text-red-400 hover:text-red-300 mx-1" title="حذف"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('Error loading users:', err);
            }
        }

        // --- Actions ---
        function openAddModal() { 
            document.getElementById('add-modal').classList.remove('hidden'); 
            document.getElementById('add-modal').classList.add('flex'); 
        }
        
        function closeAddModal() { 
            document.getElementById('add-modal').classList.add('hidden'); 
            document.getElementById('add-modal').classList.remove('flex');
            document.getElementById('new-name').value = '';
            document.getElementById('new-traffic').value = '';
            document.getElementById('new-days').value = '';
        }

        async function addUser() {
            const name = document.getElementById('new-name').value;
            const traffic = document.getElementById('new-traffic').value;
            const days = document.getElementById('new-days').value;

            if (!name) { alert('لطفا نام کاربر را وارد کنید'); return; }

            try {
                // ارسال درخواست افزودن کاربر به /sync/api/users
                const res = await fetch(`${API_URL}/api/users?key=${authToken}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name, 
                        trafficLimit: traffic ? parseFloat(traffic) * 6000 : null, // تبدیل GB به Request
                        expiryDays: days ? parseInt(days) : null 
                    })
                });
                
                const result = await res.json();
                if (result.success) {
                    closeAddModal();
                    loadUsers();
                    alert(`کاربر اضافه شد!\nUUID: ${result.user.id}`);
                } else {
                    alert('خطا در افزودن کاربر: ' + (result.error || 'Unknown'));
                }
            } catch (err) {
                console.error(err);
                alert('خطا در ارتباط با سرور');
            }
        }

        async function deleteUser(id) {
            if(confirm('آیا مطمئن هستید؟')) {
                try {
                    // حذف کاربر از طریق متد DELETE یا POST با action=delete
                    // در کد اصلی Nahan، حذف معمولاً با PUT یا POST انجام می‌شود
                    // اما برای سادگی اینجا از متد استاندارد REST استفاده می‌کنیم
                    // اگر کار نکرد، باید متد را به POST تغییر دهید
                    await fetch(`${API_URL}/api/users?id=${id}&key=${authToken}`, {
                        method: 'DELETE'
                    });
                    loadUsers();
                } catch (err) {
                    alert('خطا در حذف کاربر');
                }
            }
        }

        // --- Utilities ---
        function copySub(name) {
            const link = `${window.location.origin}${API_ROUTE}?sub=${encodeURIComponent(name)}`;
            navigator.clipboard.writeText(link).then(() => {
                alert('لینک سابسکریپشن کپی شد:\n' + link);
            }).catch(err => {
                prompt('لینک را کپی کنید:', link);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
        }

        document.getElementById('password-input')?.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
